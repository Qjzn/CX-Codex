name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release -- -SchemaAudit skip

  windows-bootstrap-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run local bootstrap smoke test
        shell: pwsh
        run: |
          ./scripts/bootstrap-windows.ps1 `
            -SourceRepoRoot $PWD `
            -InstallDir "$env:TEMP\cx-codex-smoke-install" `
            -WorkspacePath "$env:TEMP\CodexWorkspace" `
            -Port 7441 `
            -Password "ci-password" `
            -SkipStartupTask `
            -SkipFirewall `
            -SkipLogin `
            -NoStart

      - name: Validate generated files
        shell: pwsh
        run: |
          Test-Path "$env:USERPROFILE\.local\bin\cx-codex-start.cmd" | Where-Object { $_ } | Out-Null
          Test-Path "$env:USERPROFILE\.cx-codex\config.json" | Where-Object { $_ } | Out-Null
